name: "Build App"
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-app:
    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          # M1
          - platform: macos-14
          - platform: windows-latest
          - platform: ubuntu-24.04

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Install System Dependencies
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libdbus-1-3 libdbus-1-dev libxi-dev libxtst-dev libgles2-mesa-dev libgtk-3-dev \
                                    librsvg2-dev jq clang libclang-dev libwebkit2gtk-4.1-dev libappindicator3-dev patchelf
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install -y jq
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install jq pkg-config cmake meson
            mkdir -p /Users/runner/lib
            ln -s /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/libclang.dylib /Users/runner/lib/libclang.dylib
          fi

      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Disable Updater/Signing
        run: jq '.plugins.updater.active = false' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Clean macOS target cache
        if: runner.os == 'macOS'
        run: cd src-tauri && cargo clean

      - name: Download Model (dynamic)
        run: curl -L -o md_v1000.0.0-redwood-dynamic.onnx https://github.com/bencevans/megadetector-onnx/releases/download/v0.3.0/md_v1000.0.0-redwood-dynamic.onnx

      # - name: Build App
      #   run: npm ci && npm run tauri build

      - name: Run Rust Tests
        run: mkdir -p build && cd src-tauri && cargo test --locked -- --nocapture

